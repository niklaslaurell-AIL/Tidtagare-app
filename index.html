<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tidtagare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="timer-container">
        <h1>Arbetstid Tidtagare</h1>
        <div id="display" class="timer-display">00:00:00</div>
        <div class="controls">
            <button id="startButton">Start</button>
            <button id="pauseButton">Paus</button>
            <button id="stopButton">Stopp</button>
        </div>
        <p id="recordedTime" class="recorded-time"></p>
        <button id="reportButton" style="display: none;">Rapportera Tid</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
